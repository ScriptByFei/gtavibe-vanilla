<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GTAVIBE</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg: #0c1a0c;
      --surface: rgba(8, 16, 24, 0.82);
      --surface-2: rgba(12, 24, 36, 0.7);
      --border: rgba(0, 210, 180, 0.18);
      --border-bright: rgba(0, 210, 180, 0.45);

      --c-hp: #ff3d3d;
      --c-hp-fill: linear-gradient(90deg, #ff2020, #ff6060);
      --c-xp: #00d2ff;
      --c-xp-fill: linear-gradient(90deg, #00a8cc, #00e8ff);
      --c-score: #ffe066;
      --c-wave: #00ffcc;
      --c-kills: #ff6b6b;
      --c-ammo: #ffdd00;
      --c-level: #cc88ff;
      --c-text: #e8f4f8;
      --c-label: rgba(160, 200, 210, 0.55);
      --c-ghost: rgba(255,255,255,0.08);

      --w-pistol: #ffdd00;
      --w-shotgun: #ff7700;
      --w-smg: #00ffcc;
      --w-locked: #2a3a44;
      --w-border-locked: rgba(80,120,140,0.3);

      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 16px;

      --font-mono: 'Space Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;

      --safe-bottom: env(safe-area-inset-bottom, 16px);
      --safe-top: env(safe-area-inset-top, 16px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas { display: block; }

    /* ─── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: calc(var(--safe-top) + 12px);
      left: calc(var(--safe-top) + 12px);
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px 16px;
      min-width: 180px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .hud-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      line-height: 1.3;
      margin-bottom: 7px;
    }
    .hud-row:last-child { margin-bottom: 0; }

    .hud-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--c-label);
      width: 38px;
      flex-shrink: 0;
    }

    .hud-label--wide { width: auto; margin-right: 4px; }

    .hud-val {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--c-text);
      letter-spacing: -0.3px;
    }
    .hud-val--score { color: var(--c-score); font-size: 16px; }
    .hud-val--wave  { color: var(--c-wave); font-size: 14px; }
    .hud-val--kills { color: var(--c-kills); }
    .hud-val--hp    { font-size: 14px; min-width: 28px; }
    .hud-val--gun   { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
    .hud-val--ammo  { color: var(--c-ammo); font-size: 14px; }
    .hud-val--lvl   { color: var(--c-level); font-size: 13px; }

    .hud-sep {
      color: var(--c-ghost);
      margin: 0 8px;
      font-size: 13px;
    }

    /* Bars */
    .bar-wrap {
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
    }

    .bar-track {
      width: 60px;
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.25s ease;
    }
    #health-bar { background: var(--c-hp-fill); box-shadow: 0 0 6px var(--c-hp); }
    #xp-bar      { background: var(--c-xp-fill); box-shadow: 0 0 6px var(--c-xp); }

    /* XP compact row */
    .hud-xp-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 7px;
    }
    .hud-xp-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-xp);
      font-weight: 700;
    }
    #xp-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    #xp-bar { height: 100%; background: var(--c-xp-fill); border-radius: 2px; transition: width 0.3s ease; box-shadow: 0 0 5px var(--c-xp); }

    /* Reload indicator */
    #hud-reload {
      display: none;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ff8c00;
      text-shadow: 0 0 8px rgba(255,140,0,0.8);
      margin-left: 4px;
    }

    /* ─── WEAPON BUTTONS ───────────────────────────────────────────────── */
    #weapon-controls {
      position: absolute;
      right: calc(var(--safe-top) + 12px);
      bottom: calc(var(--safe-bottom) + 160px);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .wbtn {
      width: 70px;
      height: 38px;
      border-radius: var(--r-md);
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      user-select: none;
      -webkit-user-select: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .wbtn:active { transform: scale(0.95); }

    .wbtn--active {
      border-width: 2px;
      box-shadow: 0 0 14px var(--glow, rgba(0,255,200,0.4)), 0 2px 8px rgba(0,0,0,0.4);
    }

    .wbtn--pistol  { --glow: var(--w-pistol); }
    .wbtn--shotgun { --glow: var(--w-shotgun); }
    .wbtn--smg     { --glow: var(--w-smg); }

    .wbtn--locked {
      border-color: var(--w-border-locked) !important;
      color: #3a4a54 !important;
      box-shadow: none !important;
    }

    .wbtn--reload {
      height: 34px;
      --glow: rgba(255,140,0,0.6);
      font-size: 11px;
      letter-spacing: 1px;
      border-color: rgba(255,140,0,0.3);
    }

    .wbtn-key {
      font-size: 9px;
      opacity: 0.5;
      font-weight: 500;
    }

    /* ─── JOYSTICK ───────────────────────────────────────────────────────── */
    #joystick-zone {
      position: absolute;
      bottom: calc(var(--safe-bottom) + 16px);
      left: calc(var(--safe-top) + 16px);
      width: 90px;
      height: 90px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    /* ─── GAME OVER ─────────────────────────────────────────────────────── */
    #gameover {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(4, 10, 16, 0.92);
      border: 1px solid rgba(255, 60, 60, 0.3);
      border-radius: var(--r-lg);
      padding: 40px 50px;
      text-align: center;
      display: none;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(255,0,0,0.15), 0 8px 40px rgba(0,0,0,0.6);
    }
    #gameover h2 {
      font-family: var(--font-ui);
      font-size: 52px;
      font-weight: 700;
      color: var(--c-hp);
      text-shadow: 0 0 30px var(--c-hp);
      letter-spacing: 4px;
      margin-bottom: 20px;
    }
    #gameover p {
      font-family: var(--font-ui);
      font-size: 18px;
      color: var(--c-text);
      margin-bottom: 8px;
      font-weight: 500;
    }
    #gameover p span { color: var(--c-score); font-weight: 700; font-family: var(--font-mono); }
    #gameover button {
      margin-top: 24px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #00b89c, #00d4aa);
      border: none;
      border-radius: var(--r-md);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,200,160,0.4);
    }
    #gameover button:active { transform: scale(0.96); }
  </style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <!-- XP row (top) -->
  <div class="hud-xp-row">
    <span class="hud-label">LVL</span>
    <span class="hud-val hud-val--lvl" id="hud-level">1</span>
    <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
    <span class="hud-xp-val" id="hud-xp">0</span>
  </div>

  <!-- Score + Wave + Kills -->
  <div class="hud-row">
    <span class="hud-label">SC</span>
    <span class="hud-val hud-val--score" id="hud-score">0</span>
    <span class="hud-sep">|</span>
    <span class="hud-label">W</span>
    <span class="hud-val hud-val--wave" id="hud-wave">1</span>
    <span class="hud-sep">|</span>
    <span class="hud-label">K</span>
    <span class="hud-val hud-val--kills" id="hud-kills">0</span>
  </div>

  <!-- HP -->
  <div class="hud-row">
    <span class="hud-label">HP</span>
    <span class="hud-val hud-val--hp" id="hud-health">100</span>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="health-bar"></div></div>
    </div>
  </div>

  <!-- Gun + Ammo -->
  <div class="hud-row">
    <span class="hud-label">GUN</span>
    <span class="hud-val hud-val--gun" id="hud-weapon">PISTOL</span>
    <span class="hud-sep">|</span>
    <span class="hud-val hud-val--ammo" id="hud-ammo-count">12</span>
    <span id="hud-reload">RELOAD</span>
  </div>
</div>

<!-- Weapon Buttons -->
<div id="weapon-controls">
  <button class="wbtn wbtn--pistol" id="btn-weapon-0" onclick="switchWeapon(0)">
    <span class="wbtn-key">1</span> PISTOL
  </button>
  <button class="wbtn wbtn--shotgun wbtn--locked" id="btn-weapon-1" onclick="switchWeapon(1)">
    <span class="wbtn-key">2</span> SG
  </button>
  <button class="wbtn wbtn--smg wbtn--locked" id="btn-weapon-2" onclick="switchWeapon(2)">
    <span class="wbtn-key">3</span> SMG
  </button>
  <button class="wbtn wbtn--reload" id="btn-reload" onclick="reload()">
    <span class="wbtn-key">R</span> RELOAD
  </button>
</div>

<!-- Joystick (visual, actual touch handled on body) -->
<div id="joystick-zone">
  <div id="joystick-base" style="width:90px;height:90px;border-radius:50%;background:rgba(0,0,0,0.4);border:2px solid rgba(0,210,180,0.25);position:relative">
    <div id="joystick-thumb" style="width:36px;height:36px;background:rgba(0,210,180,0.4);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
  </div>
</div>

<!-- Game Over -->
<div id="gameover">
  <h2>DEAD</h2>
  <p>Score: <span id="go-score">0</span></p>
  <p>Wave: <span id="go-wave">1</span> &nbsp; Kills: <span id="go-kills">0</span></p>
  <p>Level: <span id="go-level">1</span></p>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ────────────────────────────────────────────────────────────────
const GRID_SIZE = 6;
const BLOCK_SIZE = 20;
const WORLD_SIZE = GRID_SIZE * BLOCK_SIZE;

// ─── WEAPONS ───────────────────────────────────────────────────────────────
const WEAPONS = [
  { name: 'PISTOL',  ammo: 12, fireRate: 280, damage: 40, bulletSpeed: 42, spread: 0,    pellets: 1,  color: '#ffdd00', minLevel: 1 },
  { name: 'SHOTGUN', ammo: 6,  fireRate: 750, damage: 18, bulletSpeed: 38, spread: 0.12, pellets: 5,  color: '#ff7700', minLevel: 3 },
  { name: 'SMG',     ammo: 30, fireRate: 90,  damage: 12, bulletSpeed: 48, spread: 0.04, pellets: 1,  color: '#00ffcc', minLevel: 5 },
];

// ─── STATE ────────────────────────────────────────────────────────────────
const state = {
  health: 100,
  playerRot: 0,
  keys: { w: false, a: false, s: false, d: false },
  weapon: 'pistol',
  pistolAmmo: 12,
  shotgunAmmo: 6,
  score: 0,
  wave: 1,
  waveKills: 0,
  xp: 0,
  level: 1,
  zombies: [],
  bullets: [],
  lastShot: 0,
  reloading: false,
  reloadTimer: 0,
  gameOver: false,
};

// ─── SCENE ────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e3a1e);
scene.fog = new THREE.FogExp2(0x1e3a1e, 0.015);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(-30 * aspect / 2, 30 * aspect / 2, 30 / 2, -30 / 2, 0.1, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.6);
dirLight.position.set(50, 80, 25);
scene.add(dirLight);

// ─── MAP ─────────────────────────────────────────────────────────────────
function createMap() {
  // Ground — dark green with subtle checker variation
  const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x203820 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(WORLD_SIZE / 2, -0.02, WORLD_SIZE / 2);
  scene.add(ground);

  // Subtle ground detail — scattered dark patches
  const patchMat = new THREE.MeshLambertMaterial({ color: 0x183018 });
  for (let i = 0; i < 40; i++) {
    const w = 8 + Math.random() * 20;
    const d = 8 + Math.random() * 20;
    const geo = new THREE.PlaneGeometry(w, d);
    const patch = new THREE.Mesh(geo, patchMat);
    patch.rotation.x = -Math.PI / 2;
    patch.position.set(Math.random() * WORLD_SIZE, -0.015, Math.random() * WORLD_SIZE);
    scene.add(patch);
  }

  // Grass tufts
  const grassColors = [0x4d7a38, 0x5d8a48, 0x6d9a58, 0x7daa68, 0x8dba78];
  for (let i = 0; i < 350; i++) {
    const x = Math.random() * WORLD_SIZE;
    const z = Math.random() * WORLD_SIZE;
    const h = 0.25 + Math.random() * 0.55;
    const color = grassColors[Math.floor(Math.random() * grassColors.length)];
    const geo = new THREE.BoxGeometry(0.12, h, 0.12);
    const mat = new THREE.MeshLambertMaterial({ color });
    const blade = new THREE.Mesh(geo, mat);
    blade.position.set(x, h / 2, z);
    blade.rotation.y = Math.random() * Math.PI;
    scene.add(blade);
  }

  // Small rocks / pebbles for texture
  const rockMat = new THREE.MeshLambertMaterial({ color: 0x1a2a1a });
  for (let i = 0; i < 60; i++) {
    const x = Math.random() * WORLD_SIZE;
    const z = Math.random() * WORLD_SIZE;
    const geo = new THREE.BoxGeometry(0.3 + Math.random() * 0.4, 0.15 + Math.random() * 0.2, 0.3 + Math.random() * 0.4);
    const rock = new THREE.Mesh(geo, rockMat);
    rock.position.set(x, 0.05, z);
    rock.rotation.y = Math.random() * Math.PI;
    scene.add(rock);
  }
}

// ─── PLAYER ───────────────────────────────────────────────────────────────
let playerMesh;
function createPlayer() {
  const group = new THREE.Group();

  // Shadow circle under player
  const shadowGeo = new THREE.CircleGeometry(1.2, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.05;
  group.add(shadow);

  // Legs — bright blue jeans
  const legMat = new THREE.MeshLambertMaterial({ color: 0x3355cc });
  const legGeo = new THREE.BoxGeometry(0.5, 1.6, 0.5);
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(-0.3, 0.8, 0);
  group.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo, legMat);
  rightLeg.position.set(0.3, 0.8, 0);
  group.add(rightLeg);

  // Torso — bright red hoodie
  const torsoGeo = new THREE.BoxGeometry(1.3, 1.6, 0.7);
  const torsoMat = new THREE.MeshLambertMaterial({ color: 0xee3333 });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 2.2;
  group.add(torso);

  // Head — skin
  const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
  const headMat = new THREE.MeshLambertMaterial({ color: 0xffbb88 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 3.5;
  group.add(head);

  // Arms — skin
  const armMat = new THREE.MeshLambertMaterial({ color: 0xffbb88 });
  const armGeo = new THREE.BoxGeometry(0.4, 1.4, 0.4);
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.9, 2.0, 0);
  group.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, armMat);
  rightArm.position.set(0.9, 2.0, 0);
  group.add(rightArm);

  // Gun — dark grey
  const gunGeo = new THREE.BoxGeometry(0.2, 0.2, 0.8);
  const gunMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
  const gun = new THREE.Mesh(gunGeo, gunMat);
  gun.position.set(0.9, 2.2, 0.5);
  group.add(gun);

  group.position.set(WORLD_SIZE / 2, 0, WORLD_SIZE / 2);
  scene.add(group);
  playerMesh = group;
}

// ─── CAMERA ───────────────────────────────────────────────────────────────
function updateCamera() {
  if (!playerMesh) return;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -30 * aspect / 2;
  camera.right = 30 * aspect / 2;
  camera.top = 30 / 2;
  camera.bottom = -30 / 2;
  camera.position.set(px, 30, pz);
  camera.lookAt(px, 0, pz);
  camera.updateProjectionMatrix();
}

// ─── INPUT ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup')    state.keys.w = true;
  if (k === 'a' || k === 'arrowleft')  state.keys.a = true;
  if (k === 's' || k === 'arrowdown')  state.keys.s = true;
  if (k === 'd' || k === 'arrowright') state.keys.d = true;
  if (k === '1') switchWeapon(0);
  if (k === '2') switchWeapon(1);
  if (k === '3') switchWeapon(2);
  if (k === 'r') reload();
  if (k === ' ') { e.preventDefault(); shoot(); }
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup')    state.keys.w = false;
  if (k === 'a' || k === 'arrowleft')  state.keys.a = false;
  if (k === 's' || k === 'arrowdown')  state.keys.s = false;
  if (k === 'd' || k === 'arrowright') state.keys.d = false;
});

// Touch movement — full left half of screen
let touchId = null;
let joyActive = false;
const joyBase = { x: 0, y: 0 };

document.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0];
  if (t.clientX < window.innerWidth * 0.5 && touchId === null) {
    touchId = t.identifier;
    joyActive = true;
    joyBase.x = t.clientX;
    joyBase.y = t.clientY;
    updateJoystickVisual(t.clientX, t.clientY);
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      updateJoystickVisual(t.clientX, t.clientY);
    }
  }
}, { passive: true });

document.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchId = null;
      joyActive = false;
      joyX = 0; joyY = 0;
      resetJoystickVisual();
    }
  }
});

let joyX = 0, joyY = 0;
const JOY_R = 45;

function updateJoystickVisual(cx, cy) {
  let dx = cx - joyBase.x;
  let dy = cy - joyBase.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > JOY_R) { dx *= JOY_R / dist; dy *= JOY_R / dist; }
  joyX = dx / JOY_R;
  joyY = dy / JOY_R;
  const thumb = document.getElementById('joystick-thumb');
  if (thumb) {
    thumb.style.left = `calc(50% + ${dx}px)`;
    thumb.style.top  = `calc(50% + ${dy}px)`;
    thumb.style.transform = 'none';
  }
}

function resetJoystickVisual() {
  const thumb = document.getElementById('joystick-thumb');
  if (thumb) {
    thumb.style.left = '50%';
    thumb.style.top = '50%';
    thumb.style.transform = 'translate(-50%,-50%)';
  }
}

window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -30 * aspect / 2;
  camera.right = 30 * aspect / 2;
  camera.top = 30 / 2;
  camera.bottom = -30 / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── WEAPONS ─────────────────────────────────────────────────────────────
function switchWeapon(idx) {
  if (state.reloading) return;
  const w = WEAPONS[idx];
  if (state.level < w.minLevel) {
    const btn = document.getElementById('btn-weapon-' + idx);
    if (btn) {
      btn.style.borderColor = 'var(--c-hp)';
      setTimeout(() => {
        const locked = state.level < w.minLevel;
        btn.style.borderColor = locked ? 'var(--w-border-locked)' : w.color;
      }, 400);
    }
    return;
  }
  state.weapon = w.name.toLowerCase();
}

function reload() {
  if (state.reloading) return;
  const w = WEAPONS.find(wp => wp.name.toLowerCase() === state.weapon);
  if (!w) return;
  const ammoKey = state.weapon === 'pistol' ? 'pistolAmmo' : 'shotgunAmmo';
  if (state[ammoKey] >= w.ammo) return;
  state.reloading = true;
  state.reloadTimer = (w.fireRate / 1000) * 1.6;
}

function shoot() {
  if (!playerMesh || state.gameOver) return;
  const now = performance.now();
  const w = WEAPONS.find(wp => wp.name.toLowerCase() === state.weapon);
  if (!w) return;
  if (now - state.lastShot < w.fireRate) return;
  if (state.reloading) return;

  const ammoKey = state.weapon === 'pistol' ? 'pistolAmmo' : 'shotgunAmmo';
  if (state[ammoKey] <= 0) { reload(); return; }
  state[ammoKey]--;
  state.lastShot = now;

  for (let i = -Math.floor(w.pellets / 2); i <= Math.floor(w.pellets / 2); i++) {
    createBullet(w.damage, i * w.spread, w.bulletSpeed, w.color);
  }
}

function createBullet(damage, spread, speed, color) {
  if (!playerMesh) return;
  const angle = playerMesh.rotation.y + spread;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const bx = px + Math.sin(angle) * 2;
  const bz = pz + Math.cos(angle) * 2;
  const geo = new THREE.BoxGeometry(0.18, 0.18, 0.7);
  const mat = new THREE.MeshBasicMaterial({ color });
  const bullet = new THREE.Mesh(geo, mat);
  bullet.position.set(bx, 1.6, bz);
  bullet.rotation.y = angle;
  scene.add(bullet);
  state.bullets.push({ mesh: bullet, vx: Math.sin(angle) * speed, vz: Math.cos(angle) * speed, damage, life: 1.4 });
}

// ─── ZOMBIES ────────────────────────────────────────────────────────────
function spawnZombie() {
  if (state.gameOver) return;
  const edge = Math.floor(Math.random() * 4);
  let x, z;
  if (edge === 0) { x = Math.random() * WORLD_SIZE; z = 3; }
  else if (edge === 1) { x = Math.random() * WORLD_SIZE; z = WORLD_SIZE - 3; }
  else if (edge === 2) { x = 3; z = Math.random() * WORLD_SIZE; }
  else { x = WORLD_SIZE - 3; z = Math.random() * WORLD_SIZE; }

  const group = new THREE.Group();

  // Body — dark grey-green
  const bodyGeo = new THREE.BoxGeometry(0.75, 1.3, 0.45);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2a3a2a });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.85;
  group.add(body);

  // Head
  const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const headMat = new THREE.MeshLambertMaterial({ color: 0x5a4040 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.8;
  group.add(head);

  // Arms stretched forward
  const armGeo = new THREE.BoxGeometry(0.25, 0.85, 0.25);
  const armMat = new THREE.MeshLambertMaterial({ color: 0x2a3a2a });
  const lArm = new THREE.Mesh(armGeo, armMat);
  lArm.position.set(-0.6, 1.0, 0.4); lArm.rotation.x = -0.8;
  group.add(lArm);
  const rArm = new THREE.Mesh(armGeo, armMat);
  rArm.position.set(0.6, 1.0, 0.4); rArm.rotation.x = -0.8;
  group.add(rArm);

  // Glowing red eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
  const eyeGeo = new THREE.BoxGeometry(0.1,
  const eyeGeo = new THREE.BoxGeometry(0.1, 0.08, 0.05);
  const lEye = new THREE.Mesh(eyeGeo, eyeMat);
  lEye.position.set(-0.13, 1.85, 0.26);
  group.add(lEye);
  const rEye = new THREE.Mesh(eyeGeo, eyeMat);
  rEye.position.set(0.13, 1.85, 0.26);
  group.add(rEye);

  group.position.set(x, 0, z);
  scene.add(group);

  const hp = 1 + Math.floor(state.wave / 3);
  state.zombies.push({ mesh: group, hp, maxHp: hp });
}

function startWave() {
  if (state.gameOver) return;
  const count = 8 + state.wave * 5;
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnZombie(), i * 250);
  }
}

function updateZombies(dt) {
  if (!playerMesh || state.gameOver) return;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const speed = 3 + state.wave * 0.4;

  for (let i = state.zombies.length - 1; i >= 0; i--) {
    const z = state.zombies[i];
    if (z.hp <= 0) continue;

    const dx = px - z.mesh.position.x;
    const dz = pz - z.mesh.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < 1.25) {
      state.health -= 10 * dt;
      if (state.health <= 0) {
        state.health = 0;
        state.gameOver = true;
        document.getElementById('go-score').textContent = state.score;
        document.getElementById('go-wave').textContent = state.wave;
        document.getElementById('go-kills').textContent = state.waveKills;
        document.getElementById('go-level').textContent = state.level;
        document.getElementById('gameover').style.display = 'block';
      }
    } else {
      z.mesh.position.x += (dx / dist) * speed * dt;
      z.mesh.position.z += (dz / dist) * speed * dt;
      z.mesh.rotation.y = Math.atan2(dx, dz);
    }
  }

  if (!state.gameOver) {
    const alive = state.zombies.filter(z => z.hp > 0).length;
    if (alive === 0 && state.zombies.length > 0) {
      state.wave++;
      state.zombies = [];
      state.score += state.wave * 10;
      setTimeout(() => { if (!state.gameOver) startWave(); }, 2000);
    }
  }
}

function updateBullets(dt) {
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.z += b.vz * dt;
    b.life -= dt;

    if (b.life <= 0) {
      scene.remove(b.mesh);
      state.bullets.splice(i, 1);
      continue;
    }

    for (let j = state.zombies.length - 1; j >= 0; j--) {
      const z = state.zombies[j];
      if (z.hp <= 0) continue;
      const dx = b.mesh.position.x - z.mesh.position.x;
      const dz = b.mesh.position.z - z.mesh.position.z;
      if (Math.sqrt(dx * dx + dz * dz) < 1.0) {
        z.hp -= b.damage;
        scene.remove(b.mesh);
        state.bullets.splice(i, 1);
        if (z.hp <= 0) {
          scene.remove(z.mesh);
          state.zombies.splice(j, 1);
          state.score++;
          state.waveKills++;
          state.xp += 10 + state.wave * 2;
          const newLevel = Math.floor(state.xp / 50) + 1;
          if (newLevel > state.level) state.level = newLevel;
        }
        break;
      }
    }
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────
function updateHUD() {
  if (state.gameOver) return;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-wave').textContent = state.wave;
  document.getElementById('hud-kills').textContent = state.waveKills;
  document.getElementById('hud-health').textContent = Math.ceil(state.health);
  document.getElementById('health-bar').style.width = Math.max(0, state.health) + '%';

  const w = WEAPONS.find(wp => wp.name.toLowerCase() === state.weapon);
  document.getElementById('hud-ammo-count').textContent = w ? (state.weapon === 'pistol' ? state.pistolAmmo : state.shotgunAmmo) : '?';
  document.getElementById('hud-weapon').textContent = w ? w.name : '?';
  if (w) document.getElementById('hud-weapon').style.color = w.color;

  document.getElementById('hud-level').textContent = state.level;
  const xpInLevel = state.xp - (state.level - 1) * 50;
  const xpForLevel = 50;
  document.getElementById('xp-bar').style.width = Math.min(100, (xpInLevel / xpForLevel) * 100) + '%';
  document.getElementById('hud-xp').textContent = xpInLevel;

  document.getElementById('hud-reload').style.display = state.reloading ? 'inline' : 'none';

  for (let i = 0; i < WEAPONS.length; i++) {
    const btn = document.getElementById('btn-weapon-' + i);
    if (!btn) continue;
    const weaponDef = WEAPONS[i];
    const locked = state.level < weaponDef.minLevel;
    if (state.weapon === weaponDef.name.toLowerCase()) {
      btn.classList.add('wbtn--active');
      btn.classList.remove('wbtn--locked');
      btn.style.borderColor = weaponDef.color;
      btn.style.color = weaponDef.color;
    } else if (locked) {
      btn.classList.remove('wbtn--active');
      btn.classList.add('wbtn--locked');
      btn.style.borderColor = '';
      btn.style.color = '#3a4a54';
    } else {
      btn.classList.remove('wbtn--active', 'wbtn--locked');
      btn.style.borderColor = 'rgba(0,255,200,0.35)';
      btn.style.color = '#fff';
    }
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function updatePlayer(dt) {
  if (!playerMesh || state.gameOver) return;
  const speed = 8;
  let dx = 0, dz = 0;

  if (state.keys.w) dz -= 1;
  if (state.keys.s) dz += 1;
  if (state.keys.a) dx -= 1;
  if (state.keys.d) dx += 1;

  if (joyActive && (Math.abs(joyX) > 0.05 || Math.abs(joyY) > 0.05)) {
    dx = joyX; dz = joyY;
  }

  if (dx !== 0 || dz !== 0) {
    const angle = Math.atan2(dx, dz);
    playerMesh.rotation.y = angle;
    state.playerRot = angle;
    let nx = playerMesh.position.x + Math.sin(angle) * speed * dt;
    let nz = playerMesh.position.z + Math.cos(angle) * speed * dt;
    nx = Math.max(2, Math.min(WORLD_SIZE - 2, nx));
    nz = Math.max(2, Math.min(WORLD_SIZE - 2, nz));
    playerMesh.position.x = nx;
    playerMesh.position.z = nz;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state.reloading && !state.gameOver) {
    state.reloadTimer -= dt;
    if (state.reloadTimer <= 0) {
      state.reloading = false;
      const w = WEAPONS.find(wp => wp.name.toLowerCase() === state.weapon);
      if (state.weapon === 'pistol') state.pistolAmmo = w ? w.ammo : 12;
      else state.shotgunAmmo = w ? w.ammo : 6;
    }
  }

  // Auto-fire nearest zombie in range
  if (!state.gameOver && playerMesh && state.zombies.length > 0) {
    let nearest = null, nearestDist = Infinity;
    for (const z of state.zombies) {
      if (z.hp <= 0) continue;
      const dx = z.mesh.position.x - playerMesh.position.x;
      const dz = z.mesh.position.z - playerMesh.position.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < nearestDist) { nearestDist = d; nearest = z; }
    }
    if (nearest && nearestDist < 15) {
      const dx = nearest.mesh.position.x - playerMesh.position.x;
      const dz = nearest.mesh.position.z - playerMesh.position.z;
      playerMesh.rotation.y = Math.atan2(dx, dz);
      shoot();
    }
  }

  updatePlayer(dt);
  if (!state.gameOver) updateZombies(dt);
  updateBullets(dt);
  updateCamera();
  updateHUD();
  renderer.render(scene, camera);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
createMap();
createPlayer();
startWave();
updateCamera();
animate();
</script>
