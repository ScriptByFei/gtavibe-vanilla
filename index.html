<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GTAVIBE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      line-height: 1.8;
    }

    .ctrl-btn {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .ctrl-btn:active { background: rgba(255,255,255,0.35); }

    #joystick-zone {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 160px;
      height: 160px;
      z-index: 10;
    }

    #joystick-base {
      width: 160px;
      height: 160px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      position: relative;
    }

    #joystick-thumb {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #zoom-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .zoom-btn {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-btn:active { background: rgba(255,255,255,0.35); }

    #fire-btn {
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 100px;
      height: 100px;
      background: rgba(255,50,50,0.75);
      border: 3px solid rgba(255,120,120,0.9);
      border-radius: 50%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #fire-btn:active { background: rgba(200,20,20,0.85); }

    #weapon-controls {
      position: absolute;
      bottom: 160px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    #hud-reload { color: #ff0; font-size: 16px; display: none; }
    #health-bar-bg { display: inline-block; width: 120px; height: 14px; background: rgba(255,255,255,0.2); border-radius: 7px; vertical-align: middle; margin-left: 8px }
    #health-bar { height: 100%; width: 100%; background: #4caf50; border-radius: 7px; }
    #hud-ammo { color: #ff0; font-size: 22px; font-weight: bold; margin-top: 4px; }
    #gameover {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      padding: 40px 60px;
      border-radius: 16px;
      text-align: center;
      display: none;
      z-index: 100;
    }
    #gameover h2 { color: #f44336; font-size: 48px; margin-bottom: 16px; }
    #gameover p { color: #fff; font-size: 20px; margin-bottom: 24px; }
    #gameover button {
      padding: 14px 32px;
      font-size: 20px;
      background: #4caf50;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="hud">
  <div>SCORE: <span id="hud-score">0</span></div>
  <div>WAVE: <span id="hud-wave">1</span> &nbsp; KILLS: <span id="hud-kills">0</span></div>
  <div>
    HP: <span id="hud-health">100</span>
    <span id="health-bar-bg"><span id="health-bar"></span></span>
  </div>
  <div id="hud-ammo">PISTOL | <span id="hud-ammo-count">12</span></div>
  <div id="hud-reload">RELOADING...</div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">−</button>
</div>

<div id="fire-btn">FIRE</div>

<div id="weapon-controls">
  <button class="ctrl-btn" id="btn-pistol" style="width:64px;font-size:11px">1 PISTOL</button>
  <button class="ctrl-btn" id="btn-shotgun" style="width:64px;font-size:11px">2 SG</button>
  <button class="ctrl-btn" id="btn-reload" style="width:64px;font-size:11px">R REL</button>
</div>

<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>
</div>

<div id="gameover">
  <h2>DEAD</h2>
  <p>Score: <span id="go-score">0</span> — Wave: <span id="go-wave">1</span></p>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ────────────────────────────────────────────────────────────────
const GRID_SIZE = 12;
const BLOCK_SIZE = 20;
const WORLD_SIZE = GRID_SIZE * BLOCK_SIZE;

// ─── STATE ────────────────────────────────────────────────────────────────
const state = {
  health: 100,
  cameraZoom: 50,
  playerRot: 0,
  keys: { w: false, a: false, s: false, d: false },
  // Combat
  weapon: 'pistol',
  pistolAmmo: 12,
  shotgunAmmo: 6,
  score: 0,
  wave: 1,
  waveKills: 0,
  zombies: [],
  bullets: [],
  lastShot: 0,
  reloading: false,
  reloadTimer: 0,
  shooting: false,
  gameOver: false,
};

// ─── SCENE SETUP ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 80, 200);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
  -state.cameraZoom * aspect / 2,
  state.cameraZoom * aspect / 2,
  state.cameraZoom / 2,
  -state.cameraZoom / 2,
  0.1, 500
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 50, 25);
scene.add(dirLight);

// ─── MAP ─────────────────────────────────────────────────────────────────
function createMap() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a6a4a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(WORLD_SIZE / 2, -0.01, WORLD_SIZE / 2);
  scene.add(ground);

  // Grass tufts — brighter
  const grassColors = [0x4d8a3b, 0x5d9a4b, 0x6daa5b, 0x7dba6b, 0xffd700, 0xff6b6b, 0xffffff];
  for (let i = 0; i < 600; i++) {
    const x = Math.random() * WORLD_SIZE;
    const z = Math.random() * WORLD_SIZE;
    const h = 0.3 + Math.random() * 0.8;
    const color = grassColors[Math.floor(Math.random() * grassColors.length)];
    const geo = new THREE.BoxGeometry(0.15, h, 0.15);
    const mat = new THREE.MeshLambertMaterial({ color });
    const blade = new THREE.Mesh(geo, mat);
    blade.position.set(x, h / 2, z);
    blade.rotation.y = Math.random() * Math.PI;
    scene.add(blade);
  }
}

// ─── PLAYER ───────────────────────────────────────────────────────────────
let playerMesh;
function createPlayer() {
  const group = new THREE.Group();

  const legGeo = new THREE.BoxGeometry(0.6, 1.6, 0.6);
  const legMat = new THREE.MeshLambertMaterial({ color: 0x2244aa });
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(-0.35, 0.8, 0);
  group.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo, legMat);
  rightLeg.position.set(0.35, 0.8, 0);
  group.add(rightLeg);

  const torsoGeo = new THREE.BoxGeometry(1.4, 1.6, 0.8);
  const torsoMat = new THREE.MeshLambertMaterial({ color: 0xee3333 });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 2.4;
  group.add(torso);

  const headGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
  const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 3.64;
  group.add(head);

  const armGeo = new THREE.BoxGeometry(0.5, 1.4, 0.5);
  const armMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.95, 2.2, 0);
  group.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, armMat);
  rightArm.position.set(0.95, 2.2, 0);
  group.add(rightArm);

  group.position.set(WORLD_SIZE / 2, 0, WORLD_SIZE / 2);
  scene.add(group);
  playerMesh = group;
}

// ─── CAMERA ───────────────────────────────────────────────────────────────
function updateCamera() {
  if (!playerMesh) return;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const zoom = state.cameraZoom;
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -zoom * aspect / 2;
  camera.right = zoom * aspect / 2;
  camera.top = zoom / 2;
  camera.bottom = -zoom / 2;
  camera.position.set(px, zoom, pz);
  camera.lookAt(px, 0, pz);
  camera.updateProjectionMatrix();
}

// ─── INPUT ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') state.keys.w = true;
  if (k === 'a' || k === 'arrowleft') state.keys.a = true;
  if (k === 's' || k === 'arrowdown') state.keys.s = true;
  if (k === 'd' || k === 'arrowright') state.keys.d = true;
  if (k === '1') switchWeapon('pistol');
  if (k === '2') switchWeapon('shotgun');
  if (k === 'r') reload();
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') state.keys.w = false;
  if (k === 'a' || k === 'arrowleft') state.keys.a = false;
  if (k === 's' || k === 'arrowdown') state.keys.s = false;
  if (k === 'd' || k === 'arrowright') state.keys.d = false;
});

// Touch joystick
const joystickZone = document.getElementById('joystick-zone');
const joystickThumb = document.getElementById('joystick-thumb');
const BASE_R = 80;
let touchId = null;
let joyX = 0, joyY = 0;

joystickZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchId = e.changedTouches[0].identifier;
  updateJoystick(e.changedTouches[0]);
}, { passive: false });

joystickZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { updateJoystick(t); break; }
  }
}, { passive: false });

joystickZone.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchId = null;
      joyX = 0; joyY = 0;
      joystickThumb.style.transform = 'translate(-50%, -50%)';
      break;
    }
  }
});

function updateJoystick(touch) {
  const rect = joystickZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > BASE_R) { dx *= BASE_R / dist; dy *= BASE_R / dist; }
  joyX = dx / BASE_R;
  joyY = dy / BASE_R;
  joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

// Fire button
const fireBtn = document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  state.shooting = true;
  shoot();
}, { passive: false });
fireBtn.addEventListener('touchend', (e) => { e.preventDefault(); state.shooting = false; });
fireBtn.addEventListener('mousedown', () => { state.shooting = true; shoot(); });
fireBtn.addEventListener('mouseup', () => { state.shooting = false; });

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  state.cameraZoom = Math.max(20, state.cameraZoom - 15);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  state.cameraZoom = Math.min(150, state.cameraZoom + 15);
});

// Weapon buttons
document.getElementById('btn-pistol').addEventListener('click', () => switchWeapon('pistol'));
document.getElementById('btn-shotgun').addEventListener('click', () => switchWeapon('shotgun'));
document.getElementById('btn-reload').addEventListener('click', () => reload());

window.addEventListener('wheel', (e) => {
  e.preventDefault();
  state.cameraZoom = Math.max(20, Math.min(150, state.cameraZoom + (e.deltaY > 0 ? 10 : -10)));
}, { passive: false });

window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -state.cameraZoom * aspect / 2;
  camera.right = state.cameraZoom * aspect / 2;
  camera.top = state.cameraZoom / 2;
  camera.bottom = -state.cameraZoom / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── WEAPONS ─────────────────────────────────────────────────────────────
function switchWeapon(w) {
  if (state.reloading) return;
  state.weapon = w;
}

function reload() {
  if (state.reloading) return;
  const needed = state.weapon === 'pistol' ? 12 : 6;
  const current = state.weapon === 'pistol' ? state.pistolAmmo : state.shotgunAmmo;
  if (current >= needed) return;
  state.reloading = true;
  state.reloadTimer = state.weapon === 'pistol' ? 1.2 : 2.0;
}

function shoot() {
  if (!playerMesh || state.gameOver) return;
  const now = performance.now();
  const weapon = state.weapon;
  const fireRate = weapon === 'pistol' ? 280 : 750;
  if (now - state.lastShot < fireRate) return;
  if (state.reloading) return;

  if (weapon === 'pistol') {
    if (state.pistolAmmo <= 0) { reload(); return; }
    state.pistolAmmo--;
    state.lastShot = now;
    createBullet(40);
  } else {
    if (state.shotgunAmmo <= 0) { reload(); return; }
    state.shotgunAmmo--;
    state.lastShot = now;
    for (let i = -2; i <= 2; i++) createBullet(20, i * 0.1);
  }
}

function createBullet(damage, spread = 0) {
  if (!playerMesh) return;
  const angle = playerMesh.rotation.y + spread;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const bx = px + Math.sin(angle) * 1.8;
  const bz = pz + Math.cos(angle) * 1.8;
  const geo = new THREE.BoxGeometry(0.25, 0.25, 1.0);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
  const bullet = new THREE.Mesh(geo, mat);
  bullet.position.set(bx, 1.5, bz);
  bullet.rotation.y = angle;
  scene.add(bullet);
  state.bullets.push({ mesh: bullet, vx: Math.sin(angle) * 40, vz: Math.cos(angle) * 40, damage, life: 1.5 });
}

// ─── ZOMBIES ─────────────────────────────────────────────────────────────
function spawnZombie() {
  if (state.gameOver) return;
  const edge = Math.floor(Math.random() * 4);
  let x, z;
  if (edge === 0) { x = Math.random() * WORLD_SIZE; z = 3; }
  else if (edge === 1) { x = Math.random() * WORLD_SIZE; z = WORLD_SIZE - 3; }
  else if (edge === 2) { x = 3; z = Math.random() * WORLD_SIZE; }
  else { x = WORLD_SIZE - 3; z = Math.random() * WORLD_SIZE; }

  const group = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(0.8, 1.4, 0.5);
  // Zombie — scary: dark body, glowing eyes
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2d4a2d });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.9;
  group.add(body);

  const headGeo = new THREE.BoxGeometry(0.55, 0.55, 0.55);
  const headMat = new THREE.MeshLambertMaterial({ color: 0x5a3a3a });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.85;
  group.add(head);

  // Glowing red eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const eyeGeo = new THREE.BoxGeometry(0.12, 0.08, 0.05);
  const lEye = new THREE.Mesh(eyeGeo, eyeMat);
  lEye.position.set(-0.15, 1.9, 0.28);
  group.add(lEye);
  const rEye = new THREE.Mesh(eyeGeo, eyeMat);
  rEye.position.set(0.15, 1.9, 0.28);
  group.add(rEye);

  const armGeo = new THREE.BoxGeometry(0.3, 0.9, 0.3);
  const armMat = new THREE.MeshLambertMaterial({ color: 0x3a7a3a });
  const lArm = new THREE.Mesh(armGeo, armMat);
  lArm.position.set(-0.7, 1.1, 0); lArm.rotation.z = 0.5;
  group.add(lArm);
  const rArm = new THREE.Mesh(armGeo, armMat);
  rArm.position.set(0.7, 1.1, 0); rArm.rotation.z = -0.5;
  group.add(rArm);

  group.position.set(x, 0, z);
  scene.add(group);

  const hp = 1 + Math.floor(state.wave / 3);
  state.zombies.push({ mesh: group, hp, maxHp: hp });
}

function startWave() {
  if (state.gameOver) return;
  const count = 5 + state.wave * 3;
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnZombie(), i * 400);
  }
}

function updateZombies(dt) {
  if (!playerMesh || state.gameOver) return;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const speed = 2 + state.wave * 0.3;

  for (let i = state.zombies.length - 1; i >= 0; i--) {
    const z = state.zombies[i];
    if (z.hp <= 0) continue;

    const dx = px - z.mesh.position.x;
    const dz = pz - z.mesh.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < 1.3) {
      state.health -= 12 * dt;
      if (state.health <= 0) {
        state.health = 0;
        state.gameOver = true;
        document.getElementById('go-score').textContent = state.score;
        document.getElementById('go-wave').textContent = state.wave;
        document.getElementById('gameover').style.display = 'block';
      }
    } else {
      z.mesh.position.x += (dx / dist) * speed * dt;
      z.mesh.position.z += (dz / dist) * speed * dt;
      z.mesh.rotation.y = Math.atan2(dx, dz);
    }
  }

  // Check wave complete
  if (!state.gameOver) {
    const alive = state.zombies.filter(z => z.hp > 0).length;
    if (alive === 0 && state.zombies.length > 0) {
      state.wave++;
      state.zombies = [];
      state.score += state.wave * 10;
      setTimeout(() => { if (!state.gameOver) startWave(); }, 2000);
    }
  }
}

function updateBullets(dt) {
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.z += b.vz * dt;
    b.life -= dt;

    if (b.life <= 0) {
      scene.remove(b.mesh);
      state.bullets.splice(i, 1);
      continue;
    }

    // Check zombie hits
    for (let j = state.zombies.length - 1; j >= 0; j--) {
      const z = state.zombies[j];
      if (z.hp <= 0) continue;
      const dx = b.mesh.position.x - z.mesh.position.x;
      const dz = b.mesh.position.z - z.mesh.position.z;
      if (Math.sqrt(dx * dx + dz * dz) < 1.0) {
        z.hp -= b.damage;
        scene.remove(b.mesh);
        state.bullets.splice(i, 1);
        if (z.hp <= 0) {
          scene.remove(z.mesh);
          state.zombies.splice(j, 1);
          state.score++;
          state.waveKills++;
        }
        break;
      }
    }
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────
function updateHUD() {
  if (state.gameOver) return;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-wave').textContent = state.wave;
  document.getElementById('hud-kills').textContent = state.waveKills;
  document.getElementById('hud-health').textContent = Math.ceil(state.health);
  document.getElementById('health-bar').style.width = Math.max(0, state.health) + '%';
  document.getElementById('health-bar').style.background =
    state.health > 50 ? '#4caf50' : state.health > 25 ? '#ff9800' : '#f44336';
  const ammo = state.weapon === 'pistol' ? state.pistolAmmo : state.shotgunAmmo;
  document.getElementById('hud-ammo-count').textContent = ammo;
  document.getElementById('hud-reload').style.display = state.reloading ? 'block' : 'none';
  document.getElementById('btn-pistol').style.borderColor = state.weapon === 'pistol' ? '#ff0' : 'rgba(255,255,255,0.3)';
  document.getElementById('btn-shotgun').style.borderColor = state.weapon === 'shotgun' ? '#ff0' : 'rgba(255,255,255,0.3)';
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function updatePlayer(dt) {
  if (!playerMesh || state.gameOver) return;

  const speed = 8;
  let dx = 0, dz = 0;

  if (state.keys.w) dz -= 1;
  if (state.keys.s) dz += 1;
  if (state.keys.a) dx -= 1;
  if (state.keys.d) dx += 1;

  if (Math.abs(joyX) > 0.1 || Math.abs(joyY) > 0.1) {
    dx = joyX;
    dz = joyY;
  }

  if (dx !== 0 || dz !== 0) {
    const angle = Math.atan2(dx, dz);
    playerMesh.rotation.y = angle;
    state.playerRot = angle;

    let nx = playerMesh.position.x + Math.sin(angle) * speed * dt;
    let nz = playerMesh.position.z + Math.cos(angle) * speed * dt;

    nx = Math.max(2, Math.min(WORLD_SIZE - 2, nx));
    nz = Math.max(2, Math.min(WORLD_SIZE - 2, nz));

    playerMesh.position.x = nx;
    playerMesh.position.z = nz;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state.reloading && !state.gameOver) {
    state.reloadTimer -= dt;
    if (state.reloadTimer <= 0) {
      state.reloading = false;
      if (state.weapon === 'pistol') state.pistolAmmo = 12;
      else state.shotgunAmmo = 6;
    }
  }

  if (state.shooting && !state.gameOver) shoot();

  updatePlayer(dt);
  if (!state.gameOver) updateZombies(dt);
  updateBullets(dt);
  updateCamera();
  updateHUD();

  renderer.render(scene, camera);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
createMap();
createPlayer();
startWave();
updateCamera();
animate();
</script>
