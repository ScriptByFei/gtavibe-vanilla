<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GTAVIBE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      line-height: 1.6;
      background: rgba(8, 16, 24, 0.82);
      border: 1px solid rgba(0, 210, 180, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    #hud div:first-child { color: #ffe066; font-weight: 700; font-family: 'Space Mono', monospace; }
    #hud div:nth-child(2) { color: #ff6060; }
    #hud div:last-child { color: #ff6b6b; }

    #controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .ctrl-btn {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .ctrl-btn:active { background: rgba(255,255,255,0.35); }

    #joystick-zone {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 120px;
      height: 120px;
      z-index: 10;
    }

    #joystick-base {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      position: relative;
    }

    #joystick-thumb {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: none;
    }

    #weapon-controls {
      position: absolute;
      bottom: 160px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    #zoom-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .zoom-btn {
      width: 40px;
      height: 40px;
      background: rgba(8, 16, 24, 0.82);
      border: 1.5px solid rgba(0, 210, 180, 0.35);
      border-radius: 8px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      user-select: none;
      -webkit-user-select: none;
    }

    .zoom-btn:active { transform: scale(0.95); }

    .wbtn {
      width: 72px;
      height: 38px;
      background: rgba(8, 16, 24, 0.82);
      border: 2px solid rgba(0, 210, 180, 0.35);
      border-radius: 8px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }

    .wbtn:active {
      transform: scale(0.95);
    }

    .wbtn--active {
      border-width: 2px;
    }

    .wbtn-key {
      font-size: 9px;
      opacity: 0.45;
      font-weight: 500;
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<div id="hud">
  <div>SCORE: <span id="hud-cash">0</span></div>
  <div>HEALTH: <span id="hud-health">100</span></div>
  <div>WANTED: <span id="hud-wanted">0</span></div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">−</button>
</div>

<div id="weapon-controls">
  <button class="wbtn wbtn--active" id="wbtn-0" onclick="switchWeapon(0)">
    <span class="wbtn-key">1</span>
    <span>PISTOL</span>
  </button>
  <button class="wbtn" id="wbtn-1" onclick="switchWeapon(1)">
    <span class="wbtn-key">2</span>
    <span>SHOTGUN</span>
  </button>
  <button class="wbtn" id="wbtn-2" onclick="switchWeapon(2)">
    <span class="wbtn-key">3</span>
    <span>SMG</span>
  </button>
</div>

<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>
</div>

<div id="error"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ────────────────────────────────────────────────────────────────
const GRID_SIZE = 5;
const BLOCK_SIZE = 20;
const WORLD_SIZE = GRID_SIZE * BLOCK_SIZE;
const GROUND_COLOR = 0x2d5a1e;
const GRASS_COLORS = [0x3d7a28, 0x4d8a38, 0x5d9a48, 0x6daa58, 0x7dba68];

// ─── STATE ────────────────────────────────────────────────────────────────
const state = {
  cash: 0,
  health: 100,
  wantedLevel: 0,
  cameraZoom: 80,
  playerRot: 0,
  keys: { w: false, a: false, s: false, d: false },
  weapon: 0,
  lastShot: 0,
  bullets: [],
  weapons: [
    { name: 'PISTOL',  fireRate: 280, damage: 40, speed: 45, spread: 0,    pellets: 1,  color: '#ffdd00', hex: 0xffdd00 },
    { name: 'SHOTGUN', fireRate: 750, damage: 18, speed: 40, spread: 0.1,  pellets: 5,  color: '#ff7700', hex: 0xff7700 },
    { name: 'SMG',     fireRate: 90,  damage: 12, speed: 50, spread: 0.03, pellets: 1,  color: '#00ffcc', hex: 0x00ffcc },
  ],
};

// ─── SCENE SETUP ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e3a0e);
scene.fog = new THREE.FogExp2(0x1e3a0e, 0.018);

const frustumSize = state.cameraZoom;
const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustumSize * aspect / 2,
  frustumSize * aspect / 2,
  frustumSize / 2,
  -frustumSize / 2,
  0.1,
  500
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ─── LIGHTING ─────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 50, 25);
scene.add(dirLight);

// ─── MAP GENERATION ───────────────────────────────────────────────────────
function createMap() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE);
  const groundMat = new THREE.MeshLambertMaterial({ color: GROUND_COLOR });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(WORLD_SIZE / 2, 0, WORLD_SIZE / 2);
  scene.add(ground);

  // Ground patches
  const patchMat = new THREE.MeshLambertMaterial({ color: 0x254d16 });
  for (let i = 0; i < 50; i++) {
    const w = 6 + Math.random() * 18;
    const d = 6 + Math.random() * 18;
    const geo = new THREE.PlaneGeometry(w, d);
    const patch = new THREE.Mesh(geo, patchMat);
    patch.rotation.x = -Math.PI / 2;
    patch.position.set(Math.random() * WORLD_SIZE, 0.005, Math.random() * WORLD_SIZE);
    scene.add(patch);
  }

  // Grass blades
  window.grassMeshes = [];
  for (let i = 0; i < 400; i++) {
    const x = Math.random() * WORLD_SIZE;
    const z = Math.random() * WORLD_SIZE;
    const h = 0.3 + Math.random() * 0.6;
    const color = GRASS_COLORS[Math.floor(Math.random() * GRASS_COLORS.length)];
    const geo = new THREE.BoxGeometry(0.12, h, 0.12);
    const mat = new THREE.MeshLambertMaterial({ color });
    const blade = new THREE.Mesh(geo, mat);
    blade.position.set(x, h / 2, z);
    blade.rotation.y = Math.random() * Math.PI;
    scene.add(blade);
    window.grassMeshes.push(blade);
  }

  // Flowers
  const flowerColors = [0xff4444, 0xffdd44, 0xff88cc, 0xffffff, 0xff6699];
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * WORLD_SIZE;
    const z = Math.random() * WORLD_SIZE;
    const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
    const geo = new THREE.CircleGeometry(0.2 + Math.random() * 0.15, 6);
    const mat = new THREE.MeshBasicMaterial({ color });
    const flower = new THREE.Mesh(geo, mat);
    flower.rotation.x = -Math.PI / 2;
    flower.position.set(x, 0.01, z);
    scene.add(flower);
  }
}

// ─── PLAYER ───────────────────────────────────────────────────────────────
let playerMesh;
function createPlayer() {
  const group = new THREE.Group();

  // Shadow
  const shadowGeo = new THREE.CircleGeometry(1.0, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.04;
  group.add(shadow);

  // Legs — dark navy jeans
  const legMat = new THREE.MeshLambertMaterial({ color: 0x2244aa });
  const legGeo = new THREE.BoxGeometry(0.5, 1.6, 0.5);
  const leftLeg = new THREE.Mesh(legGeo, legMat);
  leftLeg.position.set(-0.28, 0.8, 0);
  group.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo, legMat);
  rightLeg.position.set(0.28, 0.8, 0);
  group.add(rightLeg);

  // Torso — red hoodie
  const torsoGeo = new THREE.BoxGeometry(1.2, 1.6, 0.65);
  const torsoMat = new THREE.MeshLambertMaterial({ color: 0xdd2222 });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 2.2;
  group.add(torso);

  // Head — skin
  const headGeo = new THREE.BoxGeometry(0.75, 0.75, 0.75);
  const headMat = new THREE.MeshLambertMaterial({ color: 0xffbb88 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 3.42;
  group.add(head);

  // Arms
  const armMat = new THREE.MeshLambertMaterial({ color: 0xffbb88 });
  const armGeo = new THREE.BoxGeometry(0.38, 1.3, 0.38);
  const leftArm = new THREE.Mesh(armGeo, armMat);
  leftArm.position.set(-0.85, 2.0, 0);
  group.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, armMat);
  rightArm.position.set(0.85, 2.0, 0);
  group.add(rightArm);

  // Gun — dark grey pistol
  const gunGeo = new THREE.BoxGeometry(0.18, 0.18, 0.7);
  const gunMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
  const gun = new THREE.Mesh(gunGeo, gunMat);
  gun.position.set(0.85, 2.2, 0.5);
  group.add(gun);

  group.position.set(WORLD_SIZE / 2, 0, WORLD_SIZE / 2);
  scene.add(group);
  playerMesh = group;
}

// ─── NPCs ─────────────────────────────────────────────────────────────────
window.npcs = [];
function createNPCs() {
  const positions = [
    [30, 30], [70, 30], [30, 70], [90, 50], [50, 90],
  ];

  const npcColors = [0x228822, 0x882288, 0x228888, 0x884422, 0x442288];

  for (let i = 0; i < positions.length; i++) {
    const [x, z] = positions[i];
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(0.8, 1.4, 0.5);
    const bodyMat = new THREE.MeshLambertMaterial({ color: npcColors[i] });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.9;
    group.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.85;
    group.add(head);

    group.position.set(x, 0, z);
    group.rotation.y = Math.random() * Math.PI * 2;
    scene.add(group);

    npcs.push({
      mesh: group,
      state: 'idle',
      targetX: x,
      targetZ: z,
      walkTimer: 0,
    });
  }
}

// ─── CAMERA ───────────────────────────────────────────────────────────────
function updateCamera() {
  if (!playerMesh) return;
  const px = playerMesh.position.x;
  const pz = playerMesh.position.z;
  const zoom = state.cameraZoom;
  const aspect = window.innerWidth / window.innerHeight;

  camera.left = -zoom * aspect / 2;
  camera.right = zoom * aspect / 2;
  camera.top = zoom / 2;
  camera.bottom = -zoom / 2;
  camera.position.set(px, zoom, pz);
  camera.lookAt(px, 0, pz);
  camera.updateProjectionMatrix();
}

// ─── INPUT ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') state.keys.w = true;
  if (k === 'a' || k === 'arrowleft') state.keys.a = true;
  if (k === 's' || k === 'arrowdown') state.keys.s = true;
  if (k === 'd' || k === 'arrowright') state.keys.d = true;
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') state.keys.w = false;
  if (k === 'a' || k === 'arrowleft') state.keys.a = false;
  if (k === 's' || k === 'arrowdown') state.keys.s = false;
  if (k === 'd' || k === 'arrowright') state.keys.d = false;
});

// Touch joystick
const joystickZone = document.getElementById('joystick-zone');
const joystickThumb = document.getElementById('joystick-thumb');
const BASE_R = 60;
let touchId = null;
let joyX = 0, joyY = 0;

joystickZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchId = e.changedTouches[0].identifier;
  updateJoystick(e.changedTouches[0]);
}, { passive: false });

joystickZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { updateJoystick(t); break; }
  }
}, { passive: false });

joystickZone.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchId = null;
      joyX = 0; joyY = 0;
      joystickThumb.style.transform = 'translate(-50%, -50%)';
      break;
    }
  }
});

function updateJoystick(touch) {
  const rect = joystickZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > BASE_R) { dx *= BASE_R / dist; dy *= BASE_R / dist; }
  joyX = dx / BASE_R;
  joyY = dy / BASE_R;
  joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  state.cameraZoom = Math.max(20, state.cameraZoom - 15);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  state.cameraZoom = Math.min(150, state.cameraZoom + 15);
});

// Mouse wheel zoom
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  state.cameraZoom = Math.max(20, Math.min(150, state.cameraZoom + (e.deltaY > 0 ? 10 : -10)));
}, { passive: false });

// Resize
window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = -state.cameraZoom * aspect / 2;
  camera.right = state.cameraZoom * aspect / 2;
  camera.top = state.cameraZoom / 2;
  camera.bottom = -state.cameraZoom / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── HUD ──────────────────────────────────────────────────────────────────
function switchWeapon(idx) {
  state.weapon = idx;
  for (let i = 0; i < 3; i++) {
    const btn = document.getElementById('wbtn-' + i);
    if (!btn) continue;
    if (i === idx) {
      btn.classList.add('wbtn--active');
      btn.style.borderColor = state.weapons[i].color;
      btn.style.boxShadow = '0 0 12px ' + state.weapons[i].color + '60';
    } else {
      btn.classList.remove('wbtn--active');
      btn.style.borderColor = 'rgba(0, 210, 180, 0.35)';
      btn.style.boxShadow = '0 2px 8px rgba(0,0,0,0.4)';
    }
  }
}

function updateHUD() {
  document.getElementById('hud-cash').textContent = state.cash;
  document.getElementById('hud-health').textContent = state.health;
  document.getElementById('hud-wanted').textContent = '★'.repeat(state.wantedLevel);
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function updatePlayer(dt) {
  if (!playerMesh) return;

  const speed = 20;
  let dx = 0, dz = 0;

  if (state.keys.w) dz -= 1;
  if (state.keys.s) dz += 1;
  if (state.keys.a) dx -= 1;
  if (state.keys.d) dx += 1;

  // Joystick overrides
  if (Math.abs(joyX) > 0.1 || Math.abs(joyY) > 0.1) {
    dx = joyX;
    dz = joyY;
  }

  if (dx !== 0 || dz !== 0) {
    const angle = Math.atan2(dx, dz);
    playerMesh.rotation.y = angle;
    state.playerRot = angle;

    const vx = Math.sin(angle) * speed * dt;
    const vz = Math.cos(angle) * speed * dt;

    let nx = playerMesh.position.x + vx;
    let nz = playerMesh.position.z + vz;

    // World bounds
    nx = Math.max(1, Math.min(WORLD_SIZE - 1, nx));
    nz = Math.max(1, Math.min(WORLD_SIZE - 1, nz));

    playerMesh.position.x = nx;
    playerMesh.position.z = nz;
  }
}

function findNearestNPC() {
  if (!playerMesh || window.npcs.length === 0) return null;
  let nearest = null, minDist = Infinity;
  for (const npc of window.npcs) {
    const dx = npc.mesh.position.x - playerMesh.position.x;
    const dz = npc.mesh.position.z - playerMesh.position.z;
    const d = Math.sqrt(dx * dx + dz * dz);
    if (d < minDist) { minDist = d; nearest = npc; }
  }
  return minDist < 20 ? nearest : null;
}

function autoFire() {
  if (!playerMesh) return;
  const now = performance.now();
  const wp = state.weapons[state.weapon];
  if (now - state.lastShot < wp.fireRate) return;
  const nearest = findNearestNPC();
  if (!nearest) return;
  state.lastShot = now;
  const dx = nearest.mesh.position.x - playerMesh.position.x;
  const dz = nearest.mesh.position.z - playerMesh.position.z;
  playerMesh.rotation.y = Math.atan2(dx, dz);
  for (let i = -Math.floor(wp.pellets / 2); i <= Math.floor(wp.pellets / 2); i++) {
    const spread = i * wp.spread;
    const angle = playerMesh.rotation.y + spread;
    const bx = playerMesh.position.x + Math.sin(angle) * 2;
    const bz = playerMesh.position.z + Math.cos(angle) * 2;
    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.6);
    const mat = new THREE.MeshBasicMaterial({ color: wp.hex });
    const bullet = new THREE.Mesh(geo, mat);
    bullet.position.set(bx, 1.6, bz);
    bullet.rotation.y = angle;
    scene.add(bullet);
    state.bullets.push({ mesh: bullet, vx: Math.sin(angle) * wp.speed, vz: Math.cos(angle) * wp.speed, damage: wp.damage, life: 1.2 });
  }
}

function updateBullets(dt) {
  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.z += b.vz * dt;
    b.life -= dt;
    if (b.life <= 0) { scene.remove(b.mesh); state.bullets.splice(i, 1); continue; }
    for (let j = window.npcs.length - 1; j >= 0; j--) {
      const npc = window.npcs[j];
      const dx = b.mesh.position.x - npc.mesh.position.x;
      const dz = b.mesh.position.z - npc.mesh.position.z;
      if (Math.sqrt(dx * dx + dz * dz) < 0.9) {
        npc.hp -= b.damage;
        scene.remove(b.mesh);
        state.bullets.splice(i, 1);
        if (npc.hp <= 0) {
          scene.remove(npc.mesh);
          window.npcs.splice(j, 1);
          state.cash++;
        }
        break;
      }
    }
  }
}

function updateNPCs(dt) {
  for (const npc of window.npcs) {
    if (npc.state === 'walking') {
      const dx = npc.targetX - npc.mesh.position.x;
      const dz = npc.targetZ - npc.mesh.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.5) {
        npc.state = 'idle';
        npc.mesh.rotation.y = Math.random() * Math.PI * 2;
      } else {
        const speed = 3;
        npc.mesh.position.x += (dx / dist) * speed * dt;
        npc.mesh.position.z += (dz / dist) * speed * dt;
        npc.mesh.rotation.y = Math.atan2(dx, dz);
      }
    } else {
      npc.walkTimer -= dt;
      if (npc.walkTimer <= 0) {
        // Pick random road cell
        const rx = 2 + Math.floor(Math.random() * (GRID_SIZE - 2)) * BLOCK_SIZE + BLOCK_SIZE / 2;
        const rz = 2 + Math.floor(Math.random() * (GRID_SIZE - 2)) * BLOCK_SIZE + BLOCK_SIZE / 2;
        npc.targetX = rx;
        npc.targetZ = rz;
        npc.state = 'walking';
        npc.walkTimer = 3 + Math.random() * 5;
      }
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = performance.now() * 0.001;

  // Sway grass
  if (window.grassMeshes) {
    for (let i = 0; i < window.grassMeshes.length; i++) {
      const blade = window.grassMeshes[i];
      const offset = i * 0.7;
      blade.rotation.x = Math.sin(t * 1.5 + offset) * 0.06;
    }
  }

  updatePlayer(dt);
  updateNPCs(dt);
  updateBullets(dt);
  autoFire();
  updateCamera();
  updateHUD();

  renderer.render(scene, camera);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
try {
  createMap();
  createPlayer();
  createNPCs();
  updateCamera();
  animate();
} catch (err) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'ERROR: ' + err.message;
  console.error(err);
}
</script>
</body>
